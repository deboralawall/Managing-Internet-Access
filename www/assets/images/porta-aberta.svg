<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fundo verde para indicar porta aberta/liberada -->
  <circle cx="50" cy="50" r="45" fill="#28a745" opacity="0.2"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#28a745" stroke-width="2"/>
  
  <!-- Ícone de checkmark (porta aberta) -->
  <path d="M 30 50 L 45 65 L 70 35" stroke="#28a745" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Texto descritivo -->
  <text x="50" y="85" text-anchor="middle" font-size="8" fill="#28a745" font-weight="bold">LIBERADA</text>
</svg>
