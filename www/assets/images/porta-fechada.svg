<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fundo vermelho para indicar porta fechada/bloqueada -->
  <circle cx="50" cy="50" r="45" fill="#dc3545" opacity="0.2"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#dc3545" stroke-width="2"/>
  
  <!-- Ícone de X (porta fechada) -->
  <path d="M 30 30 L 70 70" stroke="#dc3545" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 70 30 L 30 70" stroke="#dc3545" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Texto descritivo -->
  <text x="50" y="85" text-anchor="middle" font-size="8" fill="#dc3545" font-weight="bold">BLOQUEADA</text>
</svg>
